<body class="flex flex-col">

    <div data-include="components/header.html" class="z-50 relative shrink-0"></div>

    <main class="flex-grow container mx-auto px-4 py-8 flex flex-col items-center justify-center">

        <!-- Upload Area -->
        <div id="upload-area" class="w-full max-w-2xl border-2 border-dashed border-slate-600 rounded-2xl p-12 text-center hover:border-pink-500 hover:bg-slate-800/50 transition cursor-pointer group" onclick="document.getElementById('file-input').click()">
            <input type="file" id="file-input" accept="image/*" class="hidden">
            <div class="bg-slate-800 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4 group-hover:scale-110 transition">
                <i class="fas fa-cloud-upload-alt text-3xl text-pink-500"></i>

            <p id="status-text" class="text-slate-400 text-sm">Get 1 Free Removal. Next uses are $0.50.</p>
        </div>

        <!-- Processing State -->
        <div id="processing-state" class="hidden w-full max-w-2xl text-center py-12">
            <div class="loader mx-auto mb-4"></div>
            <h3 class="text-xl font-bold text-white animate-pulse">AI is working...</h3>
        </div>

        <!-- Result Area -->
        <div id="result-area" class="hidden w-full max-w-5xl grid grid-cols-1 lg:grid-cols-3 gap-8">

            <!-- Preview Column -->
            <div class="lg:col-span-2 space-y-4">
                <div class="bg-slate-800 rounded-xl p-2 border border-slate-700 shadow-2xl relative overflow-hidden">
                    <!-- Watermark Overlay -->
                    <div id="watermark" class="absolute inset-0 flex items-center justify-center z-10 pointer-events-none bg-black/10">
                        <span class="text-4xl font-bold text-white/30 rotate-45 select-none border-4 border-white/30 p-4">UNPAID PREVIEW</span>
                    </div>

                    <div class="transparency-grid rounded-lg overflow-hidden relative min-h-[300px] flex items-center justify-center">
                        <img id="result-image" src="" alt="Background Removed Professional Quality" class="max-w-full max-h-[600px] object-contain">
                    </div>
                </div>
                <div class="text-xs text-slate-500 text-center">
                    Original Dimensions: <span id="orig-dims">-</span>
                </div>
            </div>

            <!-- Controls Column -->
            <div class="lg:col-span-1 space-y-6">

                <!-- Download Card -->
                <div class="bg-slate-800 rounded-xl p-6 border border-slate-700 shadow-xl">

                        <!-- Format -->

                            <label class="text-xs text-slate-400 uppercase font-bold block mb-1">Format</label>
                            <select id="download-format" class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-white text-sm">
                                <option value="png">PNG (Transparent)</option>
                                <option value="webp">WEBP (Modern/Small)</option>
                                <option value="jpeg">JPG (White BG)</option>
                            </select>
                        </div>

                        <!-- Resolution -->
                        <div>
                            <label class="text-xs text-slate-400 uppercase font-bold block mb-1">Resolution</label>
                            <select id="download-size" onchange="toggleCustomSize()" class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-white text-sm">
                                <option value="original">Original Size (HD)</option>
                                <option value="large">Large (1920px Width)</option>
                                <option value="medium">Medium (1280px Width)</option>
                                <option value="small">Small (640px Width)</option>
                                <option value="custom">Custom Size...</option>
                            </select>
                        </div>

                        <!-- Custom Size Inputs (Hidden by default) -->
                        <div id="custom-size-inputs" class="hidden grid grid-cols-2 gap-2">
                            <div>
                                <label class="text-[10px] text-slate-500">Width (px)</label>
                                <input type="number" id="custom-w" class="custom-input" placeholder="W">
                            </div>
                            <div>
                                <label class="text-[10px] text-slate-500">Height (px)</label>
                                <input type="number" id="custom-h" class="custom-input" placeholder="H">
                            </div>
                        </div>

                        <!-- Payment Button -->

                            <i class="fas fa-lock"></i> Pay $0.50 & Download
                        </button>

                        <button id="free-download-btn" onclick="downloadResult()" class="hidden w-full bg-pink-600 hover:bg-pink-700 text-white font-bold py-3 rounded-lg mt-2 transition shadow-lg">
                            <i class="fas fa-download"></i> Download Free
                        </button>

                    <p class="text-xs text-center text-slate-500 mt-3">Secure payment via Paystack.</p>
                </div>

            </div>

    <div data-include="components/footer.html" class="z-50 relative shrink-0"></div>

    <script>
        // --- CONFIGURATION ---
        const API_KEY = 'giqysVdd3F1dNdbggG2Hkwjn';
        const PAYSTACK_KEY = 'pk_live_39e56c13242c01788403d8c474d2c230bd4573f4';
        const PRICE_USD = 0.50;

        // --- STATE ---
        let hasUsedFreeTrial = localStorage.getItem('zylo_free_used') === 'true';
        let hasPaidForSession = sessionStorage.getItem('zylo_paid_session') === 'true';
        let currentBlobUrl = null;
        let originalWidth = 0;
        let originalHeight = 0;

        // --- ELEMENTS ---
        const fileInput = document.getElementById('file-input');
        const uploadArea = document.getElementById('upload-area');
        const statusText = document.getElementById('status-text');
        const processingState = document.getElementById('processing-state');
        const resultArea = document.getElementById('result-area');
        const resultImage = document.getElementById('result-image');
        const payBtn = document.getElementById('pay-btn');
        const freeBtn = document.getElementById('free-download-btn');
        const watermark = document.getElementById('watermark');
        const origDims = document.getElementById('orig-dims');
        const customInputs = document.getElementById('custom-size-inputs');

        updateUI();

        function updateUI() {
            if (hasUsedFreeTrial && !hasPaidForSession) {
                statusText.innerText = "Free trial used. Pay $0.50 for next download.";
                payBtn.classList.remove('hidden');
                freeBtn.classList.add('hidden');
                watermark.style.display = 'flex';
            } else {
                statusText.innerText = hasUsedFreeTrial ? "Session Active. Downloads Unlocked." : "1 Free Use Remaining.";
                payBtn.classList.add('hidden');
                freeBtn.classList.remove('hidden');
                watermark.style.display = 'none';
            }
        }

        function toggleCustomSize() {
            const val = document.getElementById('download-size').value;
            if (val === 'custom') {
                customInputs.classList.remove('hidden');
            } else {
                customInputs.classList.add('hidden');
            }
        }

        // --- UPLOAD HANDLER ---
        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            uploadArea.classList.add('hidden');
            processingState.classList.remove('hidden');
            resultArea.classList.add('hidden');

            const formData = new FormData();
            formData.append('image_file', file);
            formData.append('size', 'auto');

            try {
                const response = await fetch('https://api.remove.bg/v1.0/removebg', {
                    method: 'POST',
                    headers: { 'X-Api-Key': API_KEY },
                    body: formData
                });

                if (!response.ok) throw new Error('API Error');

                const blob = await response.blob();
                currentBlobUrl = URL.createObjectURL(blob);

                // Get Dimensions
                const img = new Image();
                img.onload = () => {
                    originalWidth = img.width;
                    originalHeight = img.height;
                    origDims.innerText = `${originalWidth} x ${originalHeight} px`;
                    resultImage.src = currentBlobUrl;
                };
                img.src = currentBlobUrl;

                if (!hasUsedFreeTrial) {
                    hasUsedFreeTrial = true;
                    localStorage.setItem('zylo_free_used', 'true');
                }

                processingState.classList.add('hidden');
                resultArea.classList.remove('hidden');
                updateUI();

            } catch (error) {
                alert("Error processing image.");
                resetTool();
            }
        });

        // --- PAYSTACK ---
        function initiatePayment() {
            const handler = PaystackPop.setup({
                key: PAYSTACK_KEY,
                email: 'customer@example.com',
                amount: PRICE_USD * 100,
                currency: 'USD',
                ref: ''+Math.floor((Math.random() * 1000000000) + 1),
                callback: function(response) {
                    hasPaidForSession = true;
                    sessionStorage.setItem('zylo_paid_session', 'true');
                    alert('Payment Successful! Download unlocked.');
                    updateUI();
                },
                onClose: function() {
                    alert('Transaction cancelled.');
                }
            });
            handler.openIframe();
        }

        // --- DOWNLOAD WITH RESIZING ---
        function downloadResult() {
            if (!currentBlobUrl) return;

            if (hasUsedFreeTrial && !hasPaidForSession) {
                alert("Please complete payment to download.");
                initiatePayment();
                return;
            }

            const format = document.getElementById('download-format').value;
            const sizeOption = document.getElementById('download-size').value;

            let targetW = originalWidth;
            let targetH = originalHeight;

            // Calculate Target Dimensions
            if (sizeOption === 'large') {
                const ratio = originalHeight / originalWidth;
                targetW = 1920;
                targetH = Math.round(1920 * ratio);
            } else if (sizeOption === 'medium') {
                const ratio = originalHeight / originalWidth;
                targetW = 1280;
                targetH = Math.round(1280 * ratio);
            } else if (sizeOption === 'small') {
                const ratio = originalHeight / originalWidth;
                targetW = 640;
                targetH = Math.round(640 * ratio);
            } else if (sizeOption === 'custom') {
                const w = parseInt(document.getElementById('custom-w').value);
                const h = parseInt(document.getElementById('custom-h').value);
                if (w && h) {
                    targetW = w;
                    targetH = h;
                }
            }

            // Create Canvas for Resizing
            const canvas = document.createElement('canvas');
            canvas.width = targetW;
            canvas.height = targetH;
            const ctx = canvas.getContext('2d');

            const img = new Image();
            img.onload = () => {
                // Fill Background for JPG/WEBP
                if (format !== 'png') {
                    ctx.fillStyle = '#FFFFFF';
                    ctx.fillRect(0, 0, targetW, targetH);
                }

                // Draw Resized Image
                ctx.drawImage(img, 0, 0, targetW, targetH);

                // Export
                const link = document.createElement('a');
                let mimeType = 'image/png';
                let ext = 'png';

                if (format === 'jpeg') { mimeType = 'image/jpeg'; ext = 'jpg'; }
                if (format === 'webp') { mimeType = 'image/webp'; ext = 'webp'; }

                link.download = `zylo-pro-${targetW}x${targetH}.${ext}`;
                link.href = canvas.toDataURL(mimeType, 0.9);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };
            img.src = currentBlobUrl;
        }

        function resetTool() {
            fileInput.value = '';
            uploadArea.classList.remove('hidden');
            processingState.classList.add('hidden');
            resultArea.classList.add('hidden');
            currentBlobUrl = null;
            updateUI();
        }
    </script>
