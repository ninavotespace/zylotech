        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }

        .checkerboard {
            background-color: #ffffff;
            background-image: linear-gradient(45deg, #ccc 25%, transparent 25%),

                              linear-gradient(45deg, transparent 75%, #ccc 75%),
                              linear-gradient(-45deg, transparent 75%, #ccc 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }

        /* Hide number input arrows */
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* Range Slider Styling */
        input[type=range] {
            -webkit-appearance: none;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px; width: 16px;
            border-radius: 50%;
            background: #4f46e5;
            cursor: pointer;
            margin-top: -6px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 4px;
            cursor: pointer;
            background: #e5e7eb;
            border-radius: 2px;
        }

        /* Context Menu Styles */
        #contextMenu {
            display: none;
            position: absolute;
            z-index: 1000;
            width: 160px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            overflow: hidden;
            border: 1px solid #e5e7eb;
        }
        .context-item {
            padding: 10px 15px;
            cursor: pointer;
            font-size: 13px;
            color: #374151;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.1s;
        }
        .context-item:hover {
            background-color: #f3f4f6;
            color: #4f46e5;
        }
        .context-divider {
            height: 1px;
            background-color: #e5e7eb;
            margin: 2px 0;
        }

        /* --- FOOTER VISIBILITY FIXES --- */
        /* Force footer to have a distinct background and readable text */
        div[data-include="components/footer.html"] {
            background-color: #0f172a !important; /* Deep Slate Background */

        <main class="flex-1 bg-gray-100 relative flex items-start justify-center overflow-y-auto pt-10 pb-20" id="workspace">

            <div id="canvasWrapper" class="canvas-wrapper relative shadow-2xl border-4 border-white">

                <!-- Zoom Controls (Moved Inside Wrapper to stick to canvas) -->
                <div class="absolute -right-14 top-0 flex flex-col gap-2 z-30">
                    <button id="zoomIn" class="bg-white p-2 rounded-full shadow-lg hover:bg-gray-50 text-gray-700 w-10 h-10 flex items-center justify-center border border-gray-200">
                        <i class="fa-solid fa-plus"></i>
                    </button>
                    <button id="zoomOut" class="bg-white p-2 rounded-full shadow-lg hover:bg-gray-50 text-gray-700 w-10 h-10 flex items-center justify-center border border-gray-200">
                        <i class="fa-solid fa-minus"></i>
                    </button>
                    <button id="zoomReset" class="bg-white p-2 rounded-full shadow-lg hover:bg-gray-50 text-gray-700 w-10 h-10 flex items-center justify-center border border-gray-200 text-xs font-bold">
                        100%
                    </button>
                </div>

                <canvas id="c"></canvas>
            </div>

            <!-- Empty State -->
            <div id="emptyState" class="absolute inset-0 flex flex-col items-center justify-center text-gray-400 pointer-events-none z-0">
                <i class="fa-regular fa-image text-6xl mb-4 opacity-50"></i>
                <p class="text-lg font-medium">Upload images or add text</p>
            </div>

            <!-- Custom Context Menu -->
            <div id="contextMenu">
                <div class="context-item" id="ctxCopy"><i class="fa-regular fa-copy"></i> Copy</div>
                <div class="context-item" id="ctxPaste"><i class="fa-regular fa-clipboard"></i> Paste</div>
                <div class="context-divider"></div>
                <div class="context-item" id="ctxBringFront"><i class="fa-solid fa-arrow-up"></i> Bring Forward</div>
                <div class="context-item" id="ctxSendBack"><i class="fa-solid fa-arrow-down"></i> Send Backward</div>
                <div class="context-divider"></div>
                <div class="context-item" id="ctxDelete" style="color: #dc2626;"><i class="fa-solid fa-trash"></i> Delete</div>
            </div>
        </main>
    </div>

    <!-- Preview Modal -->
    <div id="previewModal" class="fixed inset-0 bg-black bg-opacity-75 z-50 hidden flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white rounded-xl shadow-2xl w-11/12 max-w-4xl max-h-[90vh] flex flex-col overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center">
                <h3 class="text-lg font-bold text-gray-800">Export Preview</h3>
                <button id="closePreview" class="text-gray-400 hover:text-gray-600 transition">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            <div class="flex-1 overflow-auto p-6 bg-gray-50 checkerboard flex items-center justify-center">
                <img id="previewImage" class="max-w-full max-h-[60vh] object-contain shadow-lg" src="" alt="Preview">
            </div>
            <div class="px-6 py-4 border-t border-gray-100 bg-white flex justify-end gap-3">
                <button id="cancelExport" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-md font-medium text-sm transition">Cancel</button>
                <button id="confirmDownload" class="px-6 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-md font-medium text-sm transition shadow-sm flex items-center">
                    <i class="fa-solid fa-download mr-2"></i> Download File
                </button>
            </div>
        </div>
    </div>

    <!-- 3. GLOBAL FOOTER (From Template) -->
    <div data-include="components/footer.html"></div>

    <script>
        // --- Initialization ---
        const canvas = new fabric.Canvas('c', {
            preserveObjectStacking: true,
            selection: true,
            backgroundColor: '#ffffff'
        });

        // Set initial default size
        canvas.setWidth(800);
        canvas.setHeight(600);

        let isCropMode = false;
        let exportFormat = 'png';
        let exportQuality = 0.9;
        let pendingDownloadUrl = null;
        let currentZoom = 1;
        let activeTextObject = null;
        let activeObject = null;
        let clipboardData = null; // Store internal copy data

        // DOM Elements
        const fileInput = document.getElementById('fileInput');
        const emptyState = document.getElementById('emptyState');
        const deleteBtn = document.getElementById('deleteBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const canvasWrapper = document.getElementById('canvasWrapper');
        const workspace = document.getElementById('workspace');
        const contextMenu = document.getElementById('contextMenu');

        // Layer Controls
        const layerControls = document.getElementById('layerControls');
        const bringForwardBtn = document.getElementById('bringForwardBtn');
        const sendBackwardBtn = document.getElementById('sendBackwardBtn');
        const deleteObjectBtn = document.getElementById('deleteObjectBtn');

        // Tabs
        const tabDesign = document.getElementById('tabDesign');
        const tabText = document.getElementById('tabText');
        const panelDesign = document.getElementById('panelDesign');
        const panelText = document.getElementById('panelText');

        // Text Controls
        const addTextBtn = document.getElementById('addTextBtn');
        const textProperties = document.getElementById('textProperties');
        const textContent = document.getElementById('textContent');
        const fontFamily = document.getElementById('fontFamily');
        const textColor = document.getElementById('textColor');
        const colorHex = document.getElementById('colorHex');
        const textSize = document.getElementById('textSize');
        const textBgColor = document.getElementById('textBgColor');

        // --- Tab Switching ---
        tabDesign.addEventListener('click', () => {
            tabDesign.classList.add('text-indigo-600', 'border-b-2', 'border-indigo-600', 'bg-indigo-50');
            tabDesign.classList.remove('text-gray-500', 'hover:text-gray-700');
            tabText.classList.remove('text-indigo-600', 'border-b-2', 'border-indigo-600', 'bg-indigo-50');
            tabText.classList.add('text-gray-500', 'hover:text-gray-700');
            panelDesign.classList.remove('hidden');
            panelText.classList.add('hidden');
        });

        tabText.addEventListener('click', () => {
            tabText.classList.add('text-indigo-600', 'border-b-2', 'border-indigo-600', 'bg-indigo-50');
            tabText.classList.remove('text-gray-500', 'hover:text-gray-700');
            tabDesign.classList.remove('text-indigo-600', 'border-b-2', 'border-indigo-600', 'bg-indigo-50');
            tabDesign.classList.add('text-gray-500', 'hover:text-gray-700');
            panelText.classList.remove('hidden');
            panelDesign.classList.add('hidden');
        });

        // --- Zoom Controls ---
        document.getElementById('zoomIn').addEventListener('click', () => adjustZoom(0.1));
        document.getElementById('zoomOut').addEventListener('click', () => adjustZoom(-0.1));
        document.getElementById('zoomReset').addEventListener('click', fitToScreen);

        function adjustZoom(delta) {
            currentZoom += delta;
            if (currentZoom < 0.1) currentZoom = 0.1;
            if (currentZoom > 5) currentZoom = 5;
            applyZoom();
        }

        function applyZoom() {
            canvasWrapper.style.transform = `scale(${currentZoom})`;
            document.getElementById('zoomReset').innerText = Math.round(currentZoom * 100) + '%';
        }

        function fitToScreen() {
            // Get current dimensions of the workspace container
            const workspaceRect = workspace.getBoundingClientRect();

            // Calculate available space (subtracting some padding for aesthetics)
            const availableWidth = workspaceRect.width - 150; // Increased padding for sidebar/controls
            const availableHeight = workspaceRect.height - 100;

            const logicalWidth = canvas.getWidth();
            const logicalHeight = canvas.getHeight();

            if(logicalWidth === 0 || logicalHeight === 0) return;

            // Calculate scale factors
            const scaleX = availableWidth / logicalWidth;
            const scaleY = availableHeight / logicalHeight;

            // Choose the smaller scale to fit entirely within view
            let newZoom = Math.min(scaleX, scaleY);

            // --- MODIFICATION: Default to 50% Zoom ---
            // We cap the zoom at 0.5 (50%) so it never starts too large.
            if (newZoom > 0.5) {
                newZoom = 0.5;
            }

            // Constraints
            if (newZoom < 0.1) newZoom = 0.1;

            currentZoom = newZoom;
            applyZoom();
        }

        // --- COPY & PASTE LOGIC ---

        // 1. Internal Copy (Ctrl+C)
        function copyObject() {
            const obj = canvas.getActiveObject();
            if (!obj) return;

            // Clone the object
            obj.clone(function(cloned) {
                clipboardData = cloned;
            });
        }

        // 2. Internal Paste (Logic)
        function pasteObject() {
            if (!clipboardData) return;

            clipboardData.clone(function(clonedObj) {
                canvas.discardActiveObject();
                clonedObj.set({
                    left: clonedObj.left + 20,
                    top: clonedObj.top + 20,
                    evented: true,
                });

                if (clonedObj.type === 'activeSelection') {
                    // active selection needs a reference to the canvas.
                    clonedObj.canvas = canvas;
                    clonedObj.forEachObject(function(obj) {
                        canvas.add(obj);
                    });
                    clonedObj.setCoords();
                } else {
                    canvas.add(clonedObj);
                }

                clipboardData.top += 20;
                clipboardData.left += 20;
                canvas.setActiveObject(clonedObj);
                canvas.requestRenderAll();
            });
        }

        // 3. External Paste (Ctrl+V from System)
        async function handleExternalPaste(e) {
            // Check if there are files in the clipboard (e.g. screenshot or file copy)
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;

            for (let index in items) {
                const item = items[index];
                if (item.kind === 'file' && item.type.includes('image')) {
                    const blob = item.getAsFile();
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        const imgObj = new Image();
                        imgObj.src = event.target.result;
                        imgObj.onload = function() {
                            const imgInstance = new fabric.Image(imgObj);
                            // Scale down if too big
                            if(imgInstance.width > canvas.width) {
                                imgInstance.scaleToWidth(canvas.width * 0.5);
                            }
                            canvas.add(imgInstance);
                            canvas.centerObject(imgInstance);
                            canvas.setActiveObject(imgInstance);
                            checkContentStatus();
                        }
                    };
                    reader.readAsDataURL(blob);
                    return; // Stop after handling first image
                }
            }

            // If no file, try internal paste (text or duplicated object)
            // Note: Browsers block reading text from clipboard without permission usually,
            // but if we have internal clipboardData, we use that.
            if(clipboardData) {
                pasteObject();
            }
        }

        // Event Listeners for Copy/Paste
        window.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'c') {
                // Don't copy if editing text
                if (!canvas.getActiveObject() || (canvas.getActiveObject().type !== 'i-text' && !canvas.getActiveObject().isEditing)) {
                     e.preventDefault();
                     copyObject();
                }
            }
            if ((e.ctrlKey || e.metaKey) && e.key === 'v') {
                e.preventDefault();
                // Try external first, fallback to internal
                // We rely on the 'paste' event listener for external files usually,
                // but for Ctrl+V keypress we trigger internal if available.
                if(clipboardData) pasteObject();
            }
        });

        window.addEventListener('paste', (e) => {
            handleExternalPaste(e);
        });

        // --- Context Menu Logic ---
        canvas.on('mouse:down', function(opt) {
            if (opt.button === 3) { // Right click
                // If clicked on nothing, hide menu
                if(!opt.target) {
                    contextMenu.style.display = 'none';
                    return;
                }

                // Show menu at mouse position
                const pointer = canvas.getPointer(opt.e);
                // Adjust for zoom and canvas offset
                const zoomScale = currentZoom;
                const rect = canvasWrapper.getBoundingClientRect();

                // Simple positioning relative to viewport for the fixed div
                contextMenu.style.left = opt.e.clientX + 'px';
                contextMenu.style.top = opt.e.clientY + 'px';
                contextMenu.style.display = 'block';

                // Select the object right-clicked
                canvas.setActiveObject(opt.target);
                canvas.renderAll();
            } else {
                // Left click hides menu
                contextMenu.style.display = 'none';
            }
        });

        // Context Menu Actions
        document.getElementById('ctxCopy').addEventListener('click', () => { copyObject(); contextMenu.style.display='none'; });
        document.getElementById('ctxPaste').addEventListener('click', () => {
            if(clipboardData) pasteObject();
            contextMenu.style.display='none';
        });
        document.getElementById('ctxDelete').addEventListener('click', () => {
            const obj = canvas.getActiveObject();
            if(obj) canvas.remove(obj);
            contextMenu.style.display='none';
        });
        document.getElementById('ctxBringFront').addEventListener('click', () => {
            const obj = canvas.getActiveObject();
            if(obj) canvas.bringForward(obj);
            contextMenu.style.display='none';
        });
        document.getElementById('ctxSendBack').addEventListener('click', () => {
            const obj = canvas.getActiveObject();
            if(obj) canvas.sendBackwards(obj);
            contextMenu.style.display='none';
        });


        // --- Multi-Image File Handling ---
        fileInput.addEventListener('change', function(e) {
            const files = e.target.files;
            if (!files || files.length === 0) return;

            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = function(f) {
                    fabric.Image.fromURL(f.target.result, function(img) {

                        const objects = canvas.getObjects();
                        const isEmpty = objects.length === 0;

                        if (isEmpty) {
                            canvas.setWidth(img.width);
                            canvas.setHeight(img.height);
                            canvas.add(img);
                            canvas.centerObject(img);
                        } else {
                            const maxDim = Math.max(canvas.getWidth(), canvas.getHeight());
                            if (img.width > maxDim || img.height > maxDim) {
                                img.scaleToWidth(maxDim * 0.5);
                            }
                            canvas.add(img);
                            canvas.centerObject(img);
                            img.setCoords();
                        }

                        canvas.renderAll();
                        checkContentStatus();

                        // Delay fitToScreen slightly to ensure DOM has updated layout
                        setTimeout(fitToScreen, 50);
                    });
                };
                reader.readAsDataURL(file);
            });
            fileInput.value = '';
        });

        function checkContentStatus() {
            if (canvas.getObjects().length > 0) {
                emptyState.classList.add('hidden');
                downloadBtn.disabled = false;
                deleteBtn.disabled = false;
            } else {
                emptyState.classList.remove('hidden');
                downloadBtn.disabled = true;
                deleteBtn.disabled = true;
            }
        }

        deleteBtn.addEventListener('click', resetEditor);
        function resetEditor() {
            if(!confirm("Clear everything?")) return;
            canvas.clear();
            canvas.backgroundColor = '#ffffff';
            activeTextObject = null;
            activeObject = null;
            clipboardData = null;
            checkContentStatus();
            toggleTextControls(false);
            toggleLayerControls(false);

            canvas.setWidth(800);
            canvas.setHeight(600);
            updateSizeInputs(800, 600);
            fitToScreen();
        }

        // --- Layer Management ---
        function toggleLayerControls(enable) {
            if (enable) {
                layerControls.classList.remove('opacity-50', 'pointer-events-none');
            } else {
                layerControls.classList.add('opacity-50', 'pointer-events-none');
            }
        }

        bringForwardBtn.addEventListener('click', () => {
            const obj = canvas.getActiveObject();
            if (obj) {
                canvas.bringForward(obj);
                canvas.renderAll();
            }
        });

        sendBackwardBtn.addEventListener('click', () => {
            const obj = canvas.getActiveObject();
            if (obj) {
                canvas.sendBackwards(obj);
                canvas.renderAll();
            }
        });

        deleteObjectBtn.addEventListener('click', () => {
            const obj = canvas.getActiveObject();
            if (obj) {
                canvas.remove(obj);
                canvas.discardActiveObject();
                canvas.renderAll();
                checkContentStatus();
                toggleLayerControls(false);
                toggleTextControls(false);
            }
        });

        // --- Selection Events ---
        canvas.on('selection:created', handleSelection);
        canvas.on('selection:updated', handleSelection);
        canvas.on('selection:cleared', () => {
            activeTextObject = null;
            activeObject = null;
            toggleTextControls(false);
            toggleLayerControls(false);
        });

        function handleSelection(e) {
            const obj = e.selected[0];
            activeObject = obj;
            toggleLayerControls(true);

            if (obj && obj.type === 'i-text') {
                activeTextObject = obj;
                toggleTextControls(true);
                syncTextControls(obj);
            } else {
                activeTextObject = null;
                toggleTextControls(false);
            }
        }

        // --- Text Engine Logic ---
        addTextBtn.addEventListener('click', () => {
            const text = new fabric.IText('Double click to edit', {
                left: canvas.getWidth() / 2,
                top: canvas.getHeight() / 2,
                fontFamily: 'Arial',
                fill: '#333333',
                fontSize: 40,
                originX: 'center',
                originY: 'center',
                fontWeight: 'normal'
            });
            canvas.add(text);
            canvas.setActiveObject(text);
            canvas.renderAll();
            checkContentStatus();
            if(panelText.classList.contains('hidden')) tabText.click();
        });

        function toggleTextControls(enable) {
            if (enable) {
                textProperties.classList.remove('opacity-50', 'pointer-events-none');
            } else {
                textProperties.classList.add('opacity-50', 'pointer-events-none');
            }
        }

        function syncTextControls(obj) {
            textContent.value = obj.text;
            fontFamily.value = obj.fontFamily;
            textColor.value = obj.fill;
            colorHex.innerText = obj.fill;
            textSize.value = obj.fontSize;
            textBgColor.value = obj.backgroundColor || '#ffffff';

            document.getElementById('boldBtn').classList.toggle('bg-indigo-100', obj.fontWeight === 'bold');
            document.getElementById('italicBtn').classList.toggle('bg-indigo-100', obj.fontStyle === 'italic');
            document.getElementById('underlineBtn').classList.toggle('bg-indigo-100', obj.underline);
            document.getElementById('linethroughBtn').classList.toggle('bg-indigo-100', obj.linethrough);
        }

        // Live Updates
        textContent.addEventListener('input', (e) => { if(activeTextObject) { activeTextObject.set({ text: e.target.value }); canvas.renderAll(); } });
        fontFamily.addEventListener('change', (e) => { if(activeTextObject) { activeTextObject.set({ fontFamily: e.target.value }); canvas.renderAll(); } });
        textColor.addEventListener('input', (e) => { if(activeTextObject) { activeTextObject.set({ fill: e.target.value }); colorHex.innerText = e.target.value; canvas.renderAll(); } });
        textSize.addEventListener('input', (e) => { if(activeTextObject) { activeTextObject.set({ fontSize: parseInt(e.target.value, 10) }); canvas.renderAll(); } });
        textBgColor.addEventListener('input', (e) => { if(activeTextObject) { activeTextObject.set({ backgroundColor: e.target.value }); canvas.renderAll(); } });

        // Formatting Buttons
        document.getElementById('boldBtn').addEventListener('click', () => toggleStyle('fontWeight', 'bold', 'normal'));
        document.getElementById('italicBtn').addEventListener('click', () => toggleStyle('fontStyle', 'italic', 'normal'));
        document.getElementById('underlineBtn').addEventListener('click', () => toggleStyle('underline', true, false));
        document.getElementById('linethroughBtn').addEventListener('click', () => toggleStyle('linethrough', true, false));
        document.getElementById('alignLeft').addEventListener('click', () => setAlign('left'));
        document.getElementById('alignCenter').addEventListener('click', () => setAlign('center'));
        document.getElementById('alignRight').addEventListener('click', () => setAlign('right'));

        function toggleStyle(prop, val1, val2) {
            if(!activeTextObject) return;
            const current = activeTextObject.get(prop);
            activeTextObject.set(prop, current === val1 ? val2 : val1);
            canvas.renderAll();
            syncTextControls(activeTextObject);
        }

        function setAlign(align) {
            if(!activeTextObject) return;
            activeTextObject.set({ textAlign: align });
            canvas.renderAll();
        }

        // Preset Styles
        window.applyPreset = function(type) {
            if(!activeTextObject) { alert("Please select a text object first."); return; }
            const t = activeTextObject;
            t.set({ shadow: null, stroke: null, strokeWidth: 0 });

            if (type === 'headline') t.set({ fontFamily: 'Impact', fill: '#1f2937', fontSize: 60, fontWeight: 'normal', fontStyle: 'normal', underline: false, backgroundColor: 'transparent' });
            else if (type === 'subhead') t.set({ fontFamily: 'Helvetica', fill: '#4b5563', fontSize: 30, fontWeight: 'normal', fontStyle: 'normal', charSpacing: 200, backgroundColor: 'transparent' });
            else if (type === 'neon') t.set({ fontFamily: 'Verdana', fill: '#ffffff', fontSize: 50, fontWeight: 'bold', backgroundColor: '#000000', shadow: new fabric.Shadow({ color: '#ec4899', blur: 15, offsetX: 0, offsetY: 0 }) });
            else if (type === 'shadow') t.set({ fontFamily: 'Georgia', fill: '#111827', fontSize: 45, fontWeight: 'normal', backgroundColor: 'transparent', shadow: new fabric.Shadow({ color: 'rgba(0,0,0,0.5)', blur: 5, offsetX: 5, offsetY: 5 }) });
            else if (type === 'gradient') t.set({ fontFamily: 'Arial', fill: '#4f46e5', fontSize: 50, fontWeight: '900', backgroundColor: 'transparent' });
            else if (type === 'outline') t.set({ fontFamily: 'Arial', fill: '#ffffff', stroke: '#000000', strokeWidth: 2, fontSize: 50, fontWeight: '900', backgroundColor: 'transparent' });
            else if (type === 'retro') t.set({ fontFamily: 'Impact', fill: '#b91c1c', backgroundColor: '#fcd34d', fontSize: 40, fontWeight: 'normal', textAlign: 'center' });
            else if (type === 'handwritten') t.set({ fontFamily: 'Brush Script MT', fill: '#1e3a8a', fontSize: 50, fontStyle: 'italic', backgroundColor: 'transparent' });

            canvas.renderAll();
            syncTextControls(t);
        }

        // --- Resize Logic ---
        const sizePreset = document.getElementById('sizePreset');
        const customWidth = document.getElementById('customWidth');
        const customHeight = document.getElementById('customHeight');

        function updateSizeInputs(w, h) {
            customWidth.value = Math.round(w);
            customHeight.value = Math.round(h);
            sizePreset.value = 'custom';
        }

        document.getElementById('applyResizeBtn').addEventListener('click', () => {
            const w = parseInt(customWidth.value);
            const h = parseInt(customHeight.value);
            if(w && h) {
                canvas.setWidth(w);
                canvas.setHeight(h);
                canvas.renderAll();
                setTimeout(fitToScreen, 50);
            }
        });

        sizePreset.addEventListener('change', (e) => {
            if (e.target.value !== 'custom') {
                const [w, h] = e.target.value.split(',').map(Number);
                customWidth.value = w;
                customHeight.value = h;
                canvas.setWidth(w);
                canvas.setHeight(h);
                canvas.renderAll();
                setTimeout(fitToScreen, 50);
            }
        });

        // --- Crop Logic ---
        const toggleCropBtn = document.getElementById('toggleCropBtn');
        const cropActions = document.getElementById('cropActions');
        const cropInstruction = document.getElementById('cropInstruction');

        toggleCropBtn.addEventListener('click', () => {
            if(isCropMode) return;

            const activeObj = canvas.getActiveObject();
            if (!activeObj || activeObj.type !== 'image') {
                alert("Please select an image on the canvas to crop.");
                return;
            }

            isCropMode = true;
            toggleCropBtn.classList.add('hidden');
            cropActions.classList.remove('hidden');
            cropInstruction.classList.remove('hidden');
            canvasWrapper.classList.add('border-indigo-500');

            canvas.selection = false;
            canvas.getObjects().forEach(o => {
                if (o !== activeObj) o.selectable = false;
            });
            canvas.renderAll();
        });

        document.getElementById('cancelCropBtn').addEventListener('click', exitCropMode);

        function exitCropMode() {
            isCropMode = false;
            toggleCropBtn.classList.remove('hidden');
            cropActions.classList.add('hidden');
            cropInstruction.classList.add('hidden');
            canvasWrapper.classList.remove('border-indigo-500');

            canvas.selection = true;
            canvas.getObjects().forEach(o => o.selectable = true);
            canvas.renderAll();
        }

        document.getElementById('applyCropBtn').addEventListener('click', () => {
             const activeObj = canvas.getActiveObject();
             if (!activeObj || activeObj.type !== 'image') {
                 exitCropMode();
                 return;
             }
             alert("Crop mode exited. (Note: Full rectangular cropping of specific layers requires advanced clipping logic).");
             exitCropMode();
        });

        // --- Export Logic ---
        const exportFormatSelect = document.getElementById('exportFormatSelect');
        const qualityControl = document.getElementById('qualityControl');

        exportFormatSelect.addEventListener('change', (e) => {
            exportFormat = e.target.value;
            if (['jpeg', 'webp'].includes(exportFormat)) qualityControl.classList.remove('hidden');
            else qualityControl.classList.add('hidden');
        });

        document.getElementById('qualityRange').addEventListener('input', (e) => {
            exportQuality = parseFloat(e.target.value);
            document.getElementById('qualityValue').textContent = Math.round(exportQuality * 100) + '%';
        });

        downloadBtn.addEventListener('click', () => {
            const format = exportFormatSelect.value;

            if (format === 'ico') {
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = 32;
                tempCanvas.height = 32;
                const ctx = tempCanvas.getContext('2d');
                ctx.drawImage(canvas.getElement(), 0, 0, 32, 32);
                pendingDownloadUrl = tempCanvas.toDataURL('image/png');
                document.getElementById('previewImage').src = pendingDownloadUrl;
                document.getElementById('previewModal').classList.remove('hidden');
            } else if (format === 'pdf') {
                const { jsPDF } = window.jspdf;
                const w = canvas.getWidth();
                const h = canvas.getHeight();
                const orientation = w > h ? 'l' : 'p';
                const pdfW = w * 0.264583;
                const pdfH = h * 0.264583;
                const doc = new jsPDF({ orientation: orientation, unit: 'mm', format: [pdfW, pdfH] });
                const imgData = canvas.toDataURL('image/jpeg', 1.0);
                doc.addImage(imgData, 'JPEG', 0, 0, pdfW, pdfH);
                pendingDownloadUrl = doc.output('dataurlstring');
                document.getElementById('previewImage').src = "";
                document.getElementById('previewModal').classList.remove('hidden');
            } else {
                const dataURL = canvas.toDataURL({ format: format, quality: exportQuality, multiplier: 1 });
                document.getElementById('previewImage').src = dataURL;
                document.getElementById('previewModal').classList.remove('hidden');
            }
        });

        document.getElementById('confirmDownload').addEventListener('click', () => {
            const link = document.createElement('a');
            const timestamp = Date.now();
            const format = exportFormatSelect.value;

            if (format === 'pdf') {
                link.download = `zylo-design-${timestamp}.pdf`;
                link.href = pendingDownloadUrl;
            } else if (format === 'ico') {
                link.download = `favicon.ico`;
                link.href = pendingDownloadUrl;
            } else {
                link.download = `zylo-design-${timestamp}.${format}`;
                link.href = document.getElementById('previewImage').src;
            }

            link.click();
            document.getElementById('previewModal').classList.add('hidden');
        });

        document.getElementById('closePreview').addEventListener('click', () => document.getElementById('previewModal').classList.add('hidden'));
        document.getElementById('cancelExport').addEventListener('click', () => document.getElementById('previewModal').classList.add('hidden'));

        // Keyboard Shortcuts (Delete handled separately)
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Delete') {
                const obj = canvas.getActiveObject();
                if (obj) {
                    canvas.remove(obj);
                    canvas.discardActiveObject();
                    canvas.renderAll();
                    checkContentStatus();
                    toggleLayerControls(false);
                    toggleTextControls(false);
                }
            }
        });

    </script>
</body>
</html>
